<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>López Color - Gerencia General</title>
    
    <!-- Recursos Externos: Iconografía vectorial vía FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /**
         * ==========================================
         * 1. CONFIGURACIÓN DE TOKENS DE DISEÑO
         * ==========================================
         */
        :root {
            --primary-color: #004a99;
            --accent-color: #00c6ff;
            --bg-gradient: linear-gradient(135deg, #004a99 0%, #00c6ff 100%);
            --transition-speed: 0.3s;
            --border-radius-lg: 20px;
            --border-radius-md: 12px;
        }

        /**
         * ==========================================
         * 2. ESTILOS BASE DEL VIEWPORT
         * ==========================================
         */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /**
         * ==========================================
         * 3. COMPONENTES DE INTERFAZ (UI)
         * ==========================================
         */
        
        /* Contenedor estructural de la tarjeta */
        .card {
            background: #ffffff;
            width: 90%;
            max-width: 350px;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-out forwards;
            position: relative; /* Nodo de anclaje para la marca de agua trasera */
        }

        /* Capa de fondo aislada para el logotipo de la empresa */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Carga del logo de forma local en la misma raíz del servidor */
            background-image: url('logo.png'); 
            background-repeat: no-repeat;
            background-position: center 65%; /* Posicionado en el centro del bloque de contacto */
            background-size: 180px; /* Diámetro de escala del logotipo de fondo */
            opacity: 0.08; /* Control de opacidad exacto para el efecto de marca de agua */
            z-index: 0; /* Capa relegada al fondo del layout */
            pointer-events: none; /* Inmunidad al tacto para no interceptar gestos sobre botones */
        }

        /* Bloque superior (Hero Header) */
        .header {
            background: var(--bg-gradient);
            padding: 40px 20px;
            color: #ffffff;
            position: relative;
            z-index: 1; /* Forzado de capa sobre la marca de agua */
        }

        /* Identificador Gráfico (Avatar tipográfico) */
        .avatar {
            width: 80px;
            height: 80px;
            background: #ffffff;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            letter-spacing: 0.5px; 
            font-weight: 600;
        }
        
        .tagline { 
            margin: 5px 0 0; 
            font-size: 14px; 
            opacity: 0.9; 
            font-weight: 300; 
        }

        /* Contenedor del listado operativo */
        .content { 
            padding: 30px 20px; 
            position: relative;
            z-index: 1; /* Forzado de capa sobre la marca de agua */
        }

        /* Botones de contacto y áreas de impacto táctil */
        .info-item {
            display: flex;
            align-items: center;
            background: rgba(248, 249, 250, 0.85); /* Fondo suavizado para fusión cromática con el logo */
            margin-bottom: 15px;
            padding: 15px;
            border-radius: var(--border-radius-md);
            text-decoration: none;
            color: #333333;
            transition: all var(--transition-speed) ease;
            border: 1px solid #eeeeee;
        }

        /* Microinteracciones dinámicas (Hover / Focus) */
        .info-item:hover {
            background: #ffffff;
            transform: scale(1.03);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* Simetría y encuadre del set de iconos */
        .info-item i {
            font-size: 20px;
            color: var(--primary-color);
            margin-right: 15px;
            width: 25px;
        }

        /* Jerarquías tipográficas de datos */
        .info-text span { 
            display: block; 
            font-size: 12px; 
            color: #888888; 
            text-align: left; 
        }
        
        .info-text strong { 
            font-size: 14px; 
            font-weight: 600;
        }

        /* Botón de Guardado Automático (CTA Primario) */
        .btn-vcf {
            display: block;
            background: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: var(--border-radius-md);
            margin-top: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 74, 153, 0.3);
            border: none;
            cursor: pointer;
        }

        /* Metadatos del pie de página */
        .footer {
            padding-bottom: 25px;
            font-size: 12px;
            color: #bbbbbb;
            position: relative;
            z-index: 1;
        }

        /**
         * ==========================================
         * 4. CONTROL DE ANIMACIÓN DE ENTRADA
         * ==========================================
         */
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
    </style>
</head>
<body>

    <!-- Estructura Semántica del DOM -->
    <div class="card">
        
        <!-- Bloque de Identidad Personal -->
        <header class="header">
            <div class="avatar">WL</div>
            <h1>Wilfrido López Padilla</h1>
            <p class="tagline">Gerencia General</p>
        </header>

        <!-- Bloque Operativo de Canales de Comunicación -->
        <main class="content">
            
            <!-- Acción de Llamada Directa -->
            <a href="tel:4525250216" class="info-item">
                <i class="fas fa-phone-alt"></i>
                <div class="info-text">
                    <span>Teléfono</span>
                    <strong>452 525 0216</strong>
                </div>
            </a>

            <!-- Acción de Apertura de Correo -->
            <a href="mailto:wlopez@lopezimpresores.com.mx" class="info-item">
                <i class="fas fa-envelope"></i>
                <div class="info-text">
                    <span>Correo Electrónico</span>
                    <strong>wlopez@lopezimpresores.com.mx</strong>
                </div>
            </a>

            <!-- Acción de Geolocalización Corporativa -->
            <a href="https://maps.app.goo.gl/xRUXKP3uey3gCfa66" target="_blank" rel="noopener" class="info-item">
                <i class="fas fa-building"></i>
                <div class="info-text">
                    <span>Empresa</span>
                    <strong>López Impresores</strong>
                </div>
            </a>

            <!-- Botón de Descarga / Ejecución del Payload VCard -->
            <a href="data:text/vcard;charset=utf-8,BEGIN%3AVCARD%0AVERSION%3A3.0%0AFN%3AWilfrido%20L%C3%B3pez%20Padilla%0AORG%3AL%C3%B3pez%20Impresores%0ATITLE%3AGerencia%20General%0ATEL%3BTYPE%3DCELL%3A4525250216%0AEMAIL%3Awlopez%40lopezimpresores.com.mx%0AEND%3AVCARD" 
               download="Contacto_GerenciaGeneral.vcf" 
               class="btn-vcf">
                <i class="fas fa-user-plus"></i> Guardar Contacto
            </a>
        </main>

        <!-- Cierre de Tarjeta e Información de Copyright -->
        <footer class="footer">
            López Color &copy; 2026
        </footer>
    </div>

</body>
</html>
